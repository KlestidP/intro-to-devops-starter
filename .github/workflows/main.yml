name: Main pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write   # push to ghcr.io

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false   # don't kill in-flight releases

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - run: pytest tests/test_main.py -v --color=yes

  build-test-push:
    name: Build, integration-test, push
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: fruitapi
          MYSQL_USER: fruitapi
          MYSQL_PASSWORD: fruitpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LOWER}/fruitapi"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          {
            echo "image=${IMAGE}"
            echo "sha_short=${SHA_SHORT}"
            echo "sha_tag=${IMAGE}:${SHA_SHORT}"
            echo "latest_tag=${IMAGE}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (loaded locally for integration tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: fruitapi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          # --network host so FruitAPI can reach the MySQL service on 127.0.0.1.
          docker run -d --name fruitapi \
            --network host \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=3306 \
            -e DB_USER=fruitapi \
            -e DB_PASSWORD=fruitpass \
            -e DB_NAME=fruitapi \
            fruitapi:ci
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              echo "FruitAPI is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "FruitAPI did not become healthy in time"
          docker logs fruitapi
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests against container
        env:
          BASE_URL: http://127.0.0.1:8000
        run: pytest tests/test_integration.py -v --color=yes

      - name: Stop container
        if: always()
        run: docker rm -f fruitapi || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag fruitapi:ci "${{ steps.meta.outputs.sha_tag }}"
          docker tag fruitapi:ci "${{ steps.meta.outputs.latest_tag }}"
          docker push "${{ steps.meta.outputs.sha_tag }}"
          docker push "${{ steps.meta.outputs.latest_tag }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.sha_tag }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false   # we upload below with a named artifact

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.meta.outputs.sha_short }}
          path: sbom.spdx.json

      - name: Summarize release
        run: |
          {
            echo "## Release"
            echo ""
            echo "- Image: \`${{ steps.meta.outputs.sha_tag }}\`"
            echo "- Also tagged: \`${{ steps.meta.outputs.latest_tag }}\`"
            echo "- SBOM: \`sbom-${{ steps.meta.outputs.sha_short }}\` artifact"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to ECS
    needs: build-test-push
    runs-on: ubuntu-latest
    # Skip cleanly if the repo Variable isn't set (e.g. first run before
    # terraform's OIDC role is in place). After you set AWS_DEPLOY_ROLE_ARN
    # this job becomes the CD half of CI/CD.
    if: vars.AWS_DEPLOY_ROLE_ARN != ''
    permissions:
      id-token: write   # OIDC token request
      contents: read
    env:
      AWS_REGION: eu-central-1
      ECS_CLUSTER: fruitapi-cluster
      ECS_SERVICE: fruitapi-svc
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --output text > /dev/null
          echo "Triggered rolling deploy of $ECS_SERVICE"

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
          echo "Service is stable"

      - name: Summarize deploy
        run: |
          {
            echo "## Deploy"
            echo ""
            echo "- Cluster: \`$ECS_CLUSTER\`"
            echo "- Service: \`$ECS_SERVICE\`"
            echo "- Triggered rolling deploy and waited for stability."
          } >> "$GITHUB_STEP_SUMMARY"
